      - path: Shared
        excludes:
          - AppDependencies.swift
          - Intents/SlingshotAppIntents.swift
          - Intents/SlingshotShortcuts.swift
          - Widget/WidgetData.swift
          - Library/Audio/VLCAudioBridge.h
          - Library/Audio/VLCAudioBridge.m
      - path: Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "20"
        DEVELOPMENT_TEAM: ADVQS8RXPZ
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Slingshot-tvOS/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Slingshot
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
