name: Slingshot

options:
  xcodeVersion: "1600"
  createIntermediateGroups: true
  defaultConfig: Release
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
    watchOS: "26.2"
    macOS: "15.5"
    visionOS: "2.0"

configFiles:
  Debug: Config/Config.xcconfig
  Release: Config/Config.xcconfig

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MTL_FAST_MATH: YES
    SWIFT_EMIT_LOC_STRINGS: YES
  debug:
    DEBUG_INFORMATION_FORMAT: dwarf
    ENABLE_TESTABILITY: YES
    GCC_DYNAMIC_NO_PIC: NO
    GCC_OPTIMIZATION_LEVEL: "0"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "DEBUG=1"
      - "$(inherited)"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    ONLY_ACTIVE_ARCH: YES
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  release:
    DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    ENABLE_NS_ASSERTIONS: NO
    MTL_ENABLE_DEBUG_INFO: NO
    SWIFT_COMPILATION_MODE: wholemodule

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    majorVersion: "9.1.0"
  MPVKit:
    url: https://github.com/wunax/MPVKit
    exactVersion: "0.41.2"

targets:
  Slingshot-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    entitlements:
      path: Slingshot-iOS/Slingshot-iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.doctordurant.slingshotplayer
    configFiles:
      Debug: Config/Config.xcconfig
      Release: Config/Config.xcconfig
    sources:
      - path: Slingshot-iOS
        excludes:
          - Info.plist
      - path: Shared
      - path: SlingshotLiveActivity/NowPlayingAttributes.swift
      - path: SlingshotLiveActivity/LiveTVAttributes.swift
      - path: SlingshotLiveActivity/PlaybackIntents.swift
      - path: Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "20"
        DEVELOPMENT_TEAM: ADVQS8RXPZ
        ENABLE_APP_SANDBOX: YES
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SELECTED_FILES: readonly
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Slingshot-iOS/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Slingshot
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphoneos*]": NO
        "INFOPLIST_KEY_UIApplicationSceneManifest_Generation[sdk=iphonesimulator*]": NO
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphoneos*]": UIStatusBarStyleDefault
        "INFOPLIST_KEY_UIStatusBarStyle[sdk=iphonesimulator*]": UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": "@executable_path/../Frameworks"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        MARKETING_VERSION: "1.1.0"
        PRODUCT_NAME: "$(TARGET_NAME)"
        REGISTER_APP_GROUPS: YES
        SDKROOT: auto
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Shared/Library/Audio"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_OBJC_BRIDGING_HEADER: Slingshot-iOS/Slingshot-iOS-Bridging-Header.h
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        XROS_DEPLOYMENT_TARGET: "26.0"
      release:
        VALIDATE_PRODUCT: YES
    dependencies:
      - package: Sentry
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Carthage/Build/VLCKit.xcframework
        embed: true
        codeSign: true
      - target: SlingshotLiveActivity

  Slingshot-tvOS:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    configFiles:
      Debug: Config/Config.xcconfig
      Release: Config/Config.xcconfig
    sources:
      - path: Slingshot-tvOS
        excludes:
